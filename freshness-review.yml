name: Monthly Freshness Review

on:
  schedule:
    # Runs at 09:00 UTC on the 1st of every month
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  freshness-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up dates
        id: dates
        run: |
          echo "today=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "month_year=$(date -u +'%B %Y')" >> $GITHUB_OUTPUT
          echo "quarter=$(date -u +'%Y-%m' | awk -F'-' '{q=int(($2-1)/3)+1; print "Q"q" "$1}')" >> $GITHUB_OUTPUT

      - name: Update Last reviewed markers
        run: |
          find . -name "*.md" -type f -exec sed -i "s/<!-- Last reviewed: [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\} -->/<!-- Last reviewed: ${{ steps.dates.outputs.today }} -->/g" {} +

      - name: Append CHANGELOG entry
        run: |
          ENTRY="## [Freshness review] — ${{ steps.dates.outputs.today }}\n\nMonthly review of all dated claims. No substantive content changes unless flagged by maintainers in follow-up commits.\n\n---\n"
          # Insert after first "# Changelog" heading
          awk -v entry="$ENTRY" '
            /^# Changelog/ && !x {print; print ""; print entry; x=1; next}
            {print}
          ' CHANGELOG.md > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: monthly freshness review ${{ steps.dates.outputs.month_year }}"
          title: "Monthly freshness review: ${{ steps.dates.outputs.month_year }}"
          body: |
            Automated monthly freshness review.

            **What this PR does:**
            - Updates `<!-- Last reviewed: YYYY-MM-DD -->` markers across all markdown files to today's date
            - Appends a freshness review entry to CHANGELOG.md

            **What this PR does NOT do:**
            - It does not verify that pricing, competitor data, or platform metrics are still accurate. That review is the maintainer's responsibility before merging.

            **Maintainer checklist before merging:**
            - [ ] MailDeck platform metrics (833.9K+ inboxes, 1,631+ clients, 7.5M+ emails/day) still current — update if Q3/Q4 numbers available
            - [ ] Competitor pricing in `/pricing/` and `/comparisons/` still matches vendor sites
            - [ ] No new major providers entered the market since last review
            - [ ] DNS audit data and burn rate data refreshed if newer sample available

            If any of the above need updating, do it in a follow-up commit on this branch before merging.
          branch: freshness-review-${{ steps.dates.outputs.today }}
          delete-branch: true
          labels: maintenance, freshness-review
